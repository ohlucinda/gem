---
layout: null
---

<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>gem | photos and words</title>

<link rel="stylesheet" href="https://use.typekit.net/qsa5fag.css">

<link rel="icon" type="image/x-icon" href="favicon.ico">

<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>

:root {

--accent: #111;

--text: #111;

--line: #666;

--line-hover: #111;

--bg: #ffffff;

}

* {

box-sizing: border-box;

}

body {

margin: 0;

background: var(--bg);

color: var(--text);

font-family: "jimbo-std-expanded", sans-serif;

font-weight: 400;

}

.intro {

min-height: 100vh;

display: flex;

flex-direction: column;

justify-content: center;

align-items: center;

text-align: center;

padding: 80px 32px;

}

h1 {

font-family: "jimbo-std-expanded", sans-serif;

font-size: 90px;

line-height: 1;

margin: 0 0 40px 0;

text-align: center;

}

p {

margin: 0 0 120px;

color: var(--text);

font-size: 1.5rem;

letter-spacing: 0;

line-height: 1.8;

font-family: "jimbo-std-expanded", sans-serif;

}

.walk-link {

position: relative;

display: inline-block;

color: var(--accent);

text-decoration: none;

font-size: 50px;

letter-spacing: 0;

padding-bottom: 14px;

transition: all 0.3s ease;

font-family: "jimbo-std-expanded", sans-serif;

font-weight: 400;

}

.walk-link:hover {

color: #888;

transform: translateY(3px);

}

.walk-link::after {

content: "";

position: absolute;

left: 0;

bottom: 0;

width: 100%;

height: 1px;

background: var(--line);

transition: background 0.3s ease;

}

.walk-link:hover::after {

background: var(--line-hover);

}

.random-note {

margin-top: 14px;

font-size: 11px;

line-height: 1.7;

color: #777;

font-family: "jimbo-std-expanded", sans-serif;

letter-spacing: 0.2px;

}

.mobile-copy {

display: none;

}

footer {

margin-top: 220px;

font-size: 1.1rem;

color: var(--text);

letter-spacing: 0;

font-family: "jimbo-std-expanded", sans-serif;

font-weight: 400;

}

@media (min-width: 769px) {

footer {

margin-top: 90px;

}

}

@media (max-width: 768px) {

footer {

display: none;

}

h1 {

font-size: 72px;

}

.walk-link {

font-size: 42px;

}

.mobile-copy {

display: block;

margin-top: 12px;

font-size: 0.65rem;

color: #777;

}

}

</style>

</head>

<body>

<div class="intro">

<h1>gem</h1>

<p>

写真と言葉<br>

photos and words

</p>

<div>

<a href="#" class="walk-link" id="random-post-link">

begin

</a>

<p class="random-note">

ランダムに表示されます<br>

Pages appear randomly

</p>

<p class="mobile-copy">

© 2024 ohlucinda

</p>

</div>

<script>

const posts = [

{% for post in site.posts %}

"{{ post.url | relative_url }}",

{% endfor %}

];

const randomPost = posts[Math.floor(Math.random() * posts.length)];

document.getElementById("random-post-link").href = randomPost;

</script>

<footer>

© 2024 ohlucinda

</footer>

</div>

</body>

</html>
