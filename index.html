---
layout: default
---

<style>
  :root {
    --accent: #222;
    --text: #666;
    --line: #d8d8d8;
    --line-hover: #222;
    --bg: #f7f7f5;
  }

  body {
    background: var(--bg);
  }

  .intro {
    text-align: center;
    padding: 180px 20px 140px;
  }

  h1 {
    font-size: 3.2rem;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.14em;
    margin-bottom: 28px;
  }

  p {
    color: var(--text);
    font-size: 1.15rem;
    letter-spacing: 0.08em;
    line-height: 2;
    margin-bottom: 80px;
  }

  .walk-link {
    position: relative;
    display: inline-block;
    color: var(--accent);
    text-decoration: none;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    padding-bottom: 10px;
    transition: color 0.3s ease;
  }

  .walk-link::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 1px;
    background: var(--line);
    transition: background 0.3s ease;
  }

  .walk-link:hover {
    color: #555;
  }

  .walk-link:hover::after {
    background: var(--line-hover);
  }

  footer {
    margin-top: 160px;
    font-size: 0.8rem;
    color: #999;
    letter-spacing: 0.08em;
  }

  @media (max-width: 768px) {
    .intro {
      padding: 140px 20px 100px;
    }

    h1 {
      font-size: 2.4rem;
    }

    p {
      font-size: 1rem;
      margin-bottom: 60px;
    }

    .walk-link {
      font-size: 1rem;
    }

    footer {
      margin-top: 120px;
    }
  }
</style>

<div class="intro">
  <h1>gem</h1>

  <p>散歩と、写真と、短い言葉。</p>

  <div>
    {% for post in site.posts limit:1 %}
      <a href="{{ post.url }}" class="walk-link">
        散歩をはじめる
      </a>
    {% endfor %}
  </div>

  <footer>
    © 2026 gem
  </footer>
</div>
