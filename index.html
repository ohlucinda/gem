---
layout: null
---

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="https://use.typekit.net/qsa5fag.css">

  <link rel="icon" type="image/x-icon" href="favicon.ico">
　<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>
  :root {
    --accent: #111;
    --text: #111;
    --line: #666;
    --line-hover: #111;
    --bg: #ffffff;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "jimbo-std-expanded", sans-serif;
    font-weight: 400;
  }

  .intro {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 80px 32px;

    transform: translateY(-40px);
  }

  h1 {
      font-family: "jimbo-std-expanded", sans-serif;
      font-size: 2.2rem;
      /* ここで「天井からの距離」を無理やり作ります */
      margin: 150px 0 80px 0 !important; 
      line-height: 1.2;
      display: block;
      text-align: left;
    }

  p {
    margin: 0 0 120px;
    color: var(--text);
    font-size: 1.5rem;
    letter-spacing: 0;
    line-height: 1.8;
    font-family: "jimbo-std-expanded", sans-serif;
  }

  .walk-link {
    position: relative;
    display: inline-block;
    color: var(--accent);
    text-decoration: none;
    font-size: 2rem;
    letter-spacing: 0;
    padding-bottom: 14px;
    transition: color 0.3s ease;
    font-family: "jimbo-std-expanded", sans-serif;
    font-weight: 400;
  }

  .walk-link::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 1px;
    background: var(--line);
    transition: background 0.3s ease;
  }

  .walk-link:hover {
    color: #444;
  }

  .walk-link:hover::after {
    background: var(--line-hover);
  }

  footer {
    margin-top: 220px;
    font-size: 1.1rem;
    color: var(--text);
    letter-spacing: 0;
    font-family: "jimbo-std-expanded", sans-serif;
    font-weight: 400;
  }

  @media (max-width: 768px) {
    .intro {
      padding: 60px 24px;
    }

    h1 {
      font-size: 3.8rem;
    }

    p {
      font-size: 1.15rem;
      margin-bottom: 90px;
    }

    .walk-link {
      font-size: 1.4rem;
    }

    footer {
      margin-top: 160px;
      font-size: 0.95rem;
    }
  }
</style>

<div class="intro">
  <h1>gem</h1>

  <p>写真と、短い言葉。<br>
     photos and words</p>

  <div>
    {% for post in site.posts limit:1 %}
      <a href="{{ post.url | relative_url }}" class="walk-link">
        begin
      </a>
    {% endfor %}
  </div>

  <footer>
    © 2026 gem
  </footer>
</div>
