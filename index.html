---
layout: default
---

<style>
  :root {
    --accent: #4a4a8a;
    --text: #666;
    --line: #cfcfe3;
    --line-hover: #4a4a8a;
  }

  .intro {
    text-align: center;
    padding: 120px 20px;
  }

  h1 {
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: 0.12em;
    margin-bottom: 18px;
  }

  p {
    color: var(--text);
    letter-spacing: 0.05em;
    margin-bottom: 60px;
  }

  .walk-link {
    position: relative;
    display: inline-block;
    color: #333;
    text-decoration: none;
    letter-spacing: 0.05em;
    padding-bottom: 8px;
    transition: color 0.3s ease;
  }

  .walk-link::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 1px;
    background: var(--line);
    transition: background 0.3s ease;
  }

  .walk-link:hover {
    color: var(--accent);
  }

  .walk-link:hover::after {
    background: var(--line-hover);
  }

  footer {
    margin-top: 120px;
    font-size: 0.8rem;
    color: #999;
    letter-spacing: 0.05em;
  }
</style>

<div class="intro">
  <h1>gem</h1>

  <p>散歩と、写真と、短い言葉。</p>

  <div>
    {% for post in site.posts limit:1 %}
      <a href="{{ post.url }}" class="walk-link">
        散歩をはじめる
      </a>
    {% endfor %}
  </div>

  <footer>
    © 2026 gem
  </footer>
</div>
