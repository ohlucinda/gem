---
layout: null
---

<style>
  :root {
    --accent: #222;
    --text: #666;
    --line: #d8d8d8;
    --line-hover: #222;
    --bg: #f7f7f5;
  }

  body {
    background: var(--bg);
  }

  .intro {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 40px 20px;
  box-sizing: border-box;
}

h1 {
  font-size: 4rem;
  font-weight: 600;
  letter-spacing: 0.16em;
  margin-bottom: 20px;
}

p {
  color: var(--text);
  font-size: 1rem;
  letter-spacing: 0.08em;
  margin-bottom: 72px;
}
 
.walk-link {
  position: relative;
  display: inline-block;
  color: var(--accent);
  text-decoration: none;
  font-size: 1.15rem;
  letter-spacing: 0.08em;
  padding-bottom: 12px;
  transition: color 0.3s ease;
}

.walk-link::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: 0;
  width: 100%;
  height: 1px;
  background: #999;
  transition: background 0.3s ease;
}

  .walk-link:hover {
    color: #555;
  }

  .walk-link:hover::after {
    background: var(--line-hover);
  }

  footer {
  margin-top: 140px;
  font-size: 0.8rem;
  color: #999;
  letter-spacing: 0.08em;
}

  @media (max-width: 768px) {
    .intro {
      padding: 140px 20px 100px;
    }

    h1 {
      font-size: 2.4rem;
    }

    p {
      font-size: 1rem;
      margin-bottom: 60px;
    }

    .walk-link {
      font-size: 1rem;
    }

    footer {
      margin-top: 120px;
    }
  }
</style>

<div class="intro">
  <h1>gem</h1>

  <p>写真と、短い言葉。</p>

  <div>
    {% for post in site.posts limit:1 %}
      <a href="{{ post.url | relative_url }}" class="walk-link">
        begin
      </a>
    {% endfor %}
  </div>

  <footer>
    © 2026 gem
  </footer>
</div>
