---
layout: null
---

<!DOCTYPE html>
<html lang="ja">
<head>
  <script>
    if (window.innerWidth <= 700) {
      // 住所を「フルネーム」で指定して、確実に飛ばします
      window.location.href = "https://ohlucinda.github.io/gem/sp.html";
    }
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="stylesheet" href="https://use.typekit.net/qsa5fag.css">

  <link rel="icon" type="image/x-icon" href="favicon.ico">
　<link rel="apple-touch-icon" href="apple-touch-icon.png">

<style>
  :root {
    --accent: #111;
    --text: #111;
    --line: #666;
    --line-hover: #111;
    --bg: #ffffff;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "jimbo-std-expanded", sans-serif;
    font-weight: 400;
  }

  .intro {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 80px 32px;

    transform: translateY(-80px);
  }

  h1 {
      font-family: "jimbo-std-expanded", sans-serif;
      font-size: 2.2rem;
      /* ここで「天井からの距離」を無理やり作ります */
      margin: 150px 0 80px 0 !important; 
      line-height: 1.2;
      display: block;
      text-align: left;
    }

  p {
    margin: 0 0 120px;
    color: var(--text);
    font-size: 1.5rem;
    letter-spacing: 0;
    line-height: 1.8;
    font-family: "jimbo-std-expanded", sans-serif;
  }

  .walk-link {
    position: relative;
    display: inline-block;
    color: var(--accent);
    text-decoration: none;
    font-size: 2rem;
    letter-spacing: 0;
    padding-bottom: 14px;
    transition: color 0.3s ease;
    font-family: "jimbo-std-expanded", sans-serif;
    font-weight: 400;
  }

  .walk-link::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 1px;
    background: var(--line);
    transition: background 0.3s ease;
  }

  .walk-link:hover {
    color: #444;
  }

  .walk-link:hover::after {
    background: var(--line-hover);
  }

  footer {
    margin-top: 220px;
    font-size: 1.1rem;
    color: var(--text);
    letter-spacing: 0;
    font-family: "jimbo-std-expanded", sans-serif;
    font-weight: 400;
  }

  /* --- index.html の media 部分を上書きしてください --- */

  @media (max-width: 768px) {
    /* 1. ページ全体の上の余白を詰める */
    .intro {
      padding: 0px 24px;   /* 60pxから0pxへ。画面上部へ近づけます */
    }

    /* 2. タイトルの大きさと位置を調整 */
    h1 {
      font-size: 2.2rem;   /* 3.8remだと大きすぎるので、シュッとさせます */
      margin-top: 0;       /* もし上に隙間があるなら0に */
      margin-bottom: 20px; /* 90pxから20pxへ。タイトルと写真を近づけます */
      text-align: center;  /* もし右のように真ん中に寄せたければ追加 */
    }

    /* 3. タイトル下の要素の位置を調整 */
    p {
      margin-bottom: 40px; /* 90pxから40pxへ。間延びをなくします */
    }

    /* 以下は元の設定のままでOK */
    .walk-link {
      font-size: 1.4rem;
    }

    footer {
      margin-top: 100px;   /* フッターも少し上に引き上げる */
      font-size: 0.95rem;
    }
  }
</style>

<div class="intro">
  <h1>gem</h1>

  <p>写真と、短い言葉。<br>
     photos and words</p>

  <div>
    {% for post in site.posts limit:1 %}
      <a href="{{ post.url | relative_url }}" class="walk-link">
        begin
      </a>
    {% endfor %}
  </div>

  <footer>
    © 2026 gem
  </footer>
</div>
