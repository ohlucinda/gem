---
layout: default
---

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>gem</title>
  
  <link rel="stylesheet" href="https://use.typekit.net/qsa5fag.css">

  <style>
    body {
      background-color: #ffffff; /* 背景を白に */
      color: #333;
      /* 英数字はプロジェクトのフォント、日本語はゴシック体（明朝体以外）を指定 */
      font-family: "adobe-caslon-pro", "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; 
      line-height: 1.8;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 80px 20px;
    }
    
    .content {
      max-width: 600px;
      width: 100%;
      text-align: left; /* すべて左揃え */
    }

    h1 {
      font-size: 2.2rem;
      margin-top: 0;
      margin-bottom: 40px;
      letter-spacing: 0.05em;
      font-weight: 400;
      text-align: left;
    }

    img {
      max-width: 100%;
      height: auto;
      margin: 0 0 40px 0;
      display: block;
      border-radius: 2px;
    }

    .poem {
      font-size: 1.4rem;
      color: #333;
      margin-top: 0;
      margin-bottom: 80px;
      white-space: pre-wrap;
      text-align: left;
    }

    .navigation {
      margin-top: 60px;
      display: flex;
      justify-content: flex-start;
      gap: 20px;
    }

    .nav-button {
      text-decoration: none;
      color: #888;
      border: 1px solid #ddd;
      padding: 12px 24px;
      border-radius: 5px;
      font-size: 1rem;
    }

    footer {
      margin-top: 80px;
      font-size: 0.9rem;
      color: #bbb;
      text-align: left;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>{{ page.title }}</h1>
    
    <div class="poem">
      {{ content }}
    </div>

    <div class="navigation">
      {% if page.previous %}
        <a href="{{ page.previous.url | relative_url }}" class="nav-button">← Prev</a>
      {% endif %}
      {% if page.next %}
        <a href="{{ page.next.url | relative_url }}" class="nav-button">Next →</a>
      {% endif %}
    </div>
    
    <footer>
      © 2026 gem
    </footer>
  </div>
</body>
</html>
