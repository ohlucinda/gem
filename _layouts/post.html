---
layout: null
---
<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{{ page.title }} | Gem</title>

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title }}">
  <meta name="twitter:image" content="https://gemdtp.ohlucinda.com/{{ page.image }}">
  <meta property="og:title" content="{{ page.title }}">
  <meta property="og:site_name" content="Gem">
  <meta property="og:image" content="https://gemdtp.ohlucinda.com/{{ page.image }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://ohlucinda.github.io{{ page.url }}">

  <link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/favicon.ico">
  <link rel="apple-touch-icon" href="{{ site.baseurl }}/apple-touch-icon.png">
  <link rel="stylesheet" href="https://use.typekit.net/qsa5fag.css">

  <style>

    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
    }

    .content {
      width: 500px;
      max-width: calc(100% - 40px);
      margin: 40px auto 100px auto;
      display: block;
    }

    h1 {
      font-family: "jimbo-std-expanded", sans-serif;
      font-size: 2.2rem;
      margin: 0 0 80px 0;
      line-height: 1.2;
    }

    .image-wrapper {
      width: 100%;
      margin: -20px 0 100px 0;
    }

    .image-wrapper img {
      width: 100% !important;
      height: auto !important;
      display: block;
    }

    .poem {
      font-size: 1.15rem;
      line-height: 1.8;
      white-space: pre-wrap;
      color: #111;
    }

    .next-link,
    .back-link {
      text-decoration: none;
      color: #111;
      font-family: "jimbo-std-expanded", sans-serif;
      font-size: 16px;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
    }

    .nav-links {
      margin-top: 40px;
      margin-bottom: 10px;
      text-align: center;
    }

    footer {
      font-family: "jimbo-std-expanded", sans-serif;
      font-size: 12px;
      letter-spacing: 0.5px;
      margin-top: 70px;
      padding-bottom: 0;
      text-align: center;

    }


    footer .back-link {

    color: inherit;

    text-decoration: none;

  }

    @media (display-mode: standalone) {

.intro {

padding-top: 120px;

}

}

@media (min-width: 768px) {

body {

display: none;

}

}

  </style>

</head>

<body>

  <div class="content">

    <h1>{{ page.title }}</h1>

    <div class="image-wrapper">
      <img src="https://gem.ohlucinda.com/images/{{ page.image }}">
    </div>

    <div class="poem">
{{ content }}
    </div>

    <div class="nav-links">

      <a href="javascript:history.back()" class="back-link">
        back
      </a>

      <span>&nbsp;&nbsp;/&nbsp;&nbsp;</span>

      <a href="{{ site.baseurl }}/" class="back-link">
        home
      </a>

      <span>&nbsp;&nbsp;/&nbsp;&nbsp;</span>

      <a href="#" class="next-link" id="random-next-link">
        next
      </a>

    </div>

    <script>
      const posts = [
        {% for post in site.posts %}
          "{{ post.url | relative_url }}",
        {% endfor %}
      ];

      const current = window.location.pathname;

      const filtered = posts.filter(post => post !== current);

      const randomNext = filtered[Math.floor(Math.random() * filtered.length)];

      document.getElementById("random-next-link").href = randomNext;
    </script>

    <footer>

  <a href="{{ site.baseurl }}/archive/" class="back-link">
    archive
  </a>

  <br><br>

  © 2024 ohlucinda

</footer>

  </div>

</body>
</html>
