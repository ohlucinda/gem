---
layout: default
---

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | gem</title>
  
  <link rel="stylesheet" href="https://use.typekit.net/qsa5fag.css">

  <style>
    body {
      background-color: #ffffff;
      color: #000000;
      font-family: "jimbo-std-expanded", "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
      line-height: 1.8;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      /* 最初の 40px を 120px に変更して、全体を下に下げます */
      padding: 120px 20px; 
    }
    
    /* 全体を包む箱：ここで「左端」の基準を決めます */
    /* 1. 全体を包むコンテナを中央に固定する */
    /* 1. まず、土台を画面の中央に配置する */
    .content {
      max-width: 500px; /* 画像の最大幅 */
      width: 100%;      
      margin: 0 auto;   /* これで箱自体が画面の真ん中に固定されます */
      padding: 0 20px;  /* 画面端にピッタリくっつくのを防ぐ予白 */
      box-sizing: border-box;
      text-align: left; /* 中身は基本左揃え */
    }

    /* 2. 画像の枠（土台の幅いっぱいに広がる） */
    .image-wrapper {
      width: 100%;      /* .contentの幅（最大500px）に合わせる */
      aspect-ratio: 5 / 7;
      margin-bottom: 80px;
      overflow: hidden;
      display: block;
      position: relative;
    }

    /* 3. 画像：ドアップを防ぎ、枠の左上にピタッと合わせる */
    .image-wrapper img {
      width: 100% !important;
      height: 100% !important;
      object-fit: contain;  /* 画像を潰さず、枠内に収める */
      object-position: left top; /* 枠の左上に基準を置く */
      display: block;
    }

    /* 4. タイトル（画像の左端と揃う） */
    h1 {
      font-family: "jimbo-std-expanded", sans-serif;
      font-size: 2.2rem;
      margin-bottom: 80px;
      text-align: left; 
    }
    .poem {
      font-size: 1.1rem;
      text-align: left;    /* 本文も左に */
      white-space: pre-wrap;
    }

    /* Jekyllが自動挿入する重複画像を隠す */
    .poem img {
      display: none !important;
    }

    .navigation {
      display: flex;
      gap: 15px;
      margin-top: 40px;
    }

    .nav-button {
      font-family: "jimbo-std-expanded", sans-serif;
      text-decoration: none;
      color: #000;
      border: 1px solid #000;
      padding: 8px 16px;
      font-size: 0.9rem;
    }

    footer {
      margin-top: 80px;
      font-size: 0.8rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>{{ page.title }}</h1>
    
    {% if page.image %}
    <div class="image-wrapper">
       <img src="{{ page.image | relative_url }}" alt="">
    </div>
    {% endif %}

    <div class="poem">
      {{ content }}
    </div>

    <div class="navigation">
      {% if page.previous %}
        <a href="{{ page.previous.url | relative_url }}" class="nav-button">PREV</a>
      {% endif %}
      {% if page.next %}
        <a href="{{ page.next.url | relative_url }}" class="nav-button">NEXT</a>
      {% endif %}
    </div>
    
    <footer>
      © 2026 gem
    </footer>
  </div>
</body>
</html>
