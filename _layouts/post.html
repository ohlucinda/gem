---
layout: null
---
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | gem</title>
  <link rel="stylesheet" href="https://use.typekit.net/qsa5fag.css">
  
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      text-align: left; /* 基本は左揃え */
    }

    .content {
      /* 500pxの箱を数学的な中央に配置 */
      width: 500px;
      max-width: calc(100% - 40px);
      margin: 150px auto 100px auto; /* 上に150pxの余裕、左右は自動で中央 */
      display: block;
    }

    h1 {
      font-family: "jimbo-std-expanded", sans-serif;
      font-size: 2.2rem;
      margin: 0 0 80px 0; /* 下にだけ余白 */
      line-height: 1.2;
      display: block;
    }

    .image-wrapper {
      width: 100%;
      margin: 0 0 80px 0;
      display: block;
    }

    .image-wrapper img {
      /* Safariで消えるバグを根絶するための設定 */
      width: 100% !important;
      height: auto !important;
      display: block;
    }

    .poem {
      font-size: 1.15rem;
      line-height: 1.8;
      white-space: pre-wrap;
      color: #111;
    }

    /* 戻るリンクなどがあればここに追加 */
  </style>
</head>
<body>

  <div class="content">
    <h1>{{ page.title }}</h1>

    <div class="image-wrapper">
      <img src="{{ page.image }}" width="500" height="700">
    </div>

    <div class="poem">
{{ content }}
    </div>
  </div>

</body>
</html>
