---
layout: default
---

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>gem</title>
  
  <link rel="stylesheet" href="https://use.typekit.net/qsa5fag.css">

  <style>
    body {
      background-color: #ffffff;
      color: #000000;
      font-family: "jimbo-std-expanded", "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
      line-height: 1.8;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 60px 20px;
    }
    
    .content {
      max-width: 600px;
      width: 100%;
      text-align: left;
    }

    h1 {
      font-family: "jimbo-std-expanded", sans-serif;
      font-weight: 700;
      font-size: 1.8rem;
      margin-top: 0;
      margin-bottom: 30px;
      letter-spacing: 0.02em;
    }

    /* 写真の比率を 5:7 に固定 */
    .image-container {
      width: 100%;
      aspect-ratio: 5 / 7; 
      margin-bottom: 30px;
      overflow: hidden;
      background-color: #f9f9f9; /* 読み込み中や画像がない時のための薄いグレー */
    }

    .image-container img {
      width: 100%;
      height: 100%;
      object-fit: cover; /* 枠に合わせて自動でクロップ */
      display: block;
    }

    .poem {
      font-size: 1.15rem;
      font-weight: 400;
      margin-top: 0;
      margin-bottom: 60px;
      white-space: pre-wrap;
    }

    .navigation {
      margin-top: 40px;
      display: flex;
      justify-content: flex-start;
      gap: 15px;
    }

    .nav-button {
      font-family: "jimbo-std-expanded", sans-serif;
      text-decoration: none;
      color: #000;
      border: 1px solid #000;
      padding: 8px 16px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    footer {
      margin-top: 80px;
      font-size: 0.8rem;
      font-family: "jimbo-std-expanded", sans-serif;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>{{ page.title }}</h1>
    
    <div class="image-container">
       <img src="{{ page.image | relative_url }}" alt="{{ page.title }}">
    </div>

    <div class="poem">
      {{ content }}
    </div>

    <div class="navigation">
      {% if page.previous %}
        <a href="{{ page.previous.url | relative_url }}" class="nav-button">PREV</a>
      {% endif %}
      {% if page.next %}
        <a href="{{ page.next.url | relative_url }}" class="nav-button">NEXT</a>
      {% endif %}
    </div>
    
    <footer>
      © 2026 GEM
    </footer>
  </div>
</body>
</html>
