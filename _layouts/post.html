---
layout: default
---

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>gem</title>
  <style>
    body {
      background-color: #f0f0f0;
      color: #333;
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      line-height: 1.8;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 50px 20px;
    }
    .content {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }

    /* タイトルの設定 */
    h1 {
      font-size: 1.6rem;
      margin-bottom: 25px; /* タイトルと写真の距離 */
      letter-spacing: 0.12em;
    }

    img {
      max-width: 70%;
      height: auto;
      margin: 0 auto 25px; /* 写真とポエムの距離 */
      display: block;
      border-radius: 2px;
    }

    .poem {
      font-size: 1.15rem;
      margin-top: 0;
      margin-bottom: 50px;
      white-space: pre-wrap;
      text-align: left;
      display: inline-block;
    }

    .navigation {
      margin-top: 50px;
      margin-bottom: 50px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .nav-button {
      text-decoration: none;
      color: #666;
      border: 1px solid #ccc;
      padding: 10px 20px;
      border-radius: 5px;
      font-size: 0.9rem;
    }
    footer {
      font-size: 0.8rem;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>{{ page.title }}</h1>
    
    <div class="poem">
      {{ content }}
    </div>

    <div class="navigation">
      {% if page.previous %}
        <a href="{{ page.previous.url | relative_url }}" class="nav-button">← Prev</a>
      {% endif %}
      {% if page.next %}
        <a href="{{ page.next.url | relative_url }}" class="nav-button">Next →</a>
      {% endif %}
    </div>
    
    <footer>
      © 2026 gem
    </footer>
  </div>
</body>
</html>
