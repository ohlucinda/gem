<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>gem</title>
  <style>
    body {
      background-color: #f0f0f0;
      color: #333;
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      line-height: 1.8;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 50px 20px;
    }
    .content {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    .subtitle {
      font-size: 1.2rem;       /* 少し大きくしました */
      font-weight: bold;      /* 太字にしました */
      color: #444;            /* 色を少し濃くしてハッキリさせました */
      margin-bottom: 40px;    /* 写真との間隔を少し広げました */
      letter-spacing: 0.05em; /* 文字の間隔をわずかに広げて読みやすくしました */
    }
    img {
      max-width: 100%;
      height: auto;
      margin-bottom: 30px;
    }
    .poem {
      margin-bottom: 50px;
      white-space: pre-wrap;
    }
    .navigation {
      margin-top: 50px;
      margin-bottom: 50px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .nav-button {
      text-decoration: none;
      color: #666;
      border: 1px solid #ccc;
      padding: 10px 20px;
      border-radius: 5px;
      font-size: 0.9rem;
    }
    footer {
      font-size: 0.8rem;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="subtitle">{{ page.subtitle }}</div>
    
    <div class="poem">
      {{ content }}
    </div>

    <div class="navigation">
      {% if page.previous %}
        <a href="{{ page.previous.url }}" class="nav-button">← Prev</a>
      {% endif %}
      {% if page.next %}
        <a href="{{ page.next.url }}" class="nav-button">Next →</a>
      {% endif %}
    </div>
    
    <footer>
      © 2026 gem
    </footer>
  </div>
</body>
</html>
