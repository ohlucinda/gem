<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>gem</title>
  <style>
    body {
      background-color: #f0f0f0;
      color: #333;
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      line-height: 1.8;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 50px 20px;
    }
    .content {
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    .subtitle {
  font-size: 1.2rem;
  font-weight: bold;
  color: #444;
  margin-bottom: 20px;    /* ここを 40px から 20px に減らして写真を近づけます */
  letter-spacing: 0.05em;
}

img {
  max-width: 80%;
  height: auto;
  margin: 0 auto 20px;    /* 下側の余白も 30px から 20px に減らして本文を近づけます */
  display: block;
  border-radius: 2px;
}

.poem {
  margin-top: 0;          /* 本文の上の余白をゼロにします */
  margin-bottom: 50px;
  white-space: pre-wrap;
}
    .navigation {
      margin-top: 50px;
      margin-bottom: 50px;
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .nav-button {
      text-decoration: none;
      color: #666;
      border: 1px solid #ccc;
      padding: 10px 20px;
      border-radius: 5px;
      font-size: 0.9rem;
    }
    footer {
      font-size: 0.8rem;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="subtitle">{{ page.subtitle }}</div>
    
    <div class="poem">
      {{ content }}
    </div>

    <div class="navigation">
      {% if page.previous %}
        <a href="{{ page.previous.url }}" class="nav-button">← Prev</a>
      {% endif %}
      {% if page.next %}
        <a href="{{ page.next.url }}" class="nav-button">Next →</a>
      {% endif %}
    </div>
    
    <footer>
      © 2026 gem
    </footer>
  </div>
</body>
</html>
