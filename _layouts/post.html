---
layout: default
---

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | gem</title>
  
  <link rel="stylesheet" href="https://use.typekit.net/qsa5fag.css">

  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center; /* これが「数学的な中央」を決定します */
      min-height: 100vh;
    }

    .content {
      /* ここで「写真と同じ幅」を厳格に指定します */
      width: 500px; 
      max-width: 90vw; /* 画面が狭い時も中央を保つためのクッション */
      
      /* 左右の余白をブラウザに自動計算させ、完全に均等にします */
      margin-left: auto;
      margin-right: auto;
      
      display: flex;
      flex-direction: column;
      align-items: flex-start; /* 塊の中では左に揃える */
    }

    .image-wrapper {
      width: 100%; /* .contentの500pxを100%使う */
      aspect-ratio: 5 / 7;
      margin-top: 120px;
      margin-bottom: 80px;
      display: block;
    }

    .image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* 4. タイトル（画像の左端と揃う） */
    h1 {
      font-family: "jimbo-std-expanded", sans-serif; /* 書体：これは絶対必要 */
      font-size: 2.2rem;                            /* サイズ：これも必要 */
      margin-top: 0;                                 /* 上の余白をリセット */
      margin-bottom: 80px;                          /* 画像との距離：重要 */
      
      /* text-align: left; は、親要素の .content が 
         align-items: flex-start; になっていれば、書かなくても自動で左に揃います */
    }
    .poem {
      font-size: 1.1rem;
      text-align: left;    /* 本文も左に */
      white-space: pre-wrap;
    }

    /* Jekyllが自動挿入する重複画像を隠す */
    .poem img {
      display: none !important;
    }

    .navigation {
      display: flex;
      gap: 15px;
      margin-top: 40px;
    }

    .nav-button {
      font-family: "jimbo-std-expanded", sans-serif;
      text-decoration: none;
      color: #000;
      border: 1px solid #000;
      padding: 8px 16px;
      font-size: 0.9rem;
    }

    footer {
      margin-top: 80px;
      font-size: 0.8rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>{{ page.title }}</h1>
    
    {% if page.image %}
    <div class="image-wrapper">
       <img src="{{ page.image | relative_url }}" alt="">
    </div>
    {% endif %}

    <div class="poem">
      {{ content }}
    </div>

    <div class="navigation">
      {% if page.previous %}
        <a href="{{ page.previous.url | relative_url }}" class="nav-button">PREV</a>
      {% endif %}
      {% if page.next %}
        <a href="{{ page.next.url | relative_url }}" class="nav-button">NEXT</a>
      {% endif %}
    </div>
    
    <footer>
      © 2026 gem
    </footer>
  </div>
</body>
</html>
