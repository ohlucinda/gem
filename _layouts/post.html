---
layout: default
---

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>gem</title>
  
  <link rel="stylesheet" href="https://use.typekit.net/qsa5fag.css">

  <style>
    body {
      background-color: #fbfbfa;
      color: #000000;
      /* 英数字は Jimbo、日本語はスッキリしたゴシック体 */
      font-family: "jimbo-std-expanded", "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
      line-height: 1.8;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 60px 20px;
    }
    
    .content {
      max-width: 600px; /* 幅を少し絞って読みやすく */
      width: 100%;
      text-align: left;
    }

    h1 {
      font-family: "jimbo-std-expanded", sans-serif;
      font-weight: 700;
      font-size: 1.8rem; /* サイズをぐっと抑えました */
      margin-top: 0;
      margin-bottom: 30px;
      letter-spacing: 0.02em;
    }

    img {
      max-width: 100%;
      height: auto;
      margin: 0 0 30px 0;
      display: block;
    }

    .poem {
      font-size: 1.1rem; /* 標準的な読みやすいサイズに修正 */
      font-weight: 400;
      margin-top: 0;
      margin-bottom: 60px;
      white-space: pre-wrap;
    }

    .navigation {
      margin-top: 40px;
      display: flex;
      justify-content: flex-start;
      gap: 15px;
    }

    .nav-button {
      font-family: "jimbo-std-expanded", sans-serif;
      text-decoration: none;
      color: #000;
      border: 1px solid #000; /* 線も少し細くして上品に */
      padding: 8px 16px;
      font-weight: 700;
      font-size: 0.9rem;
    }

    footer {
      margin-top: 80px;
      font-size: 0.8rem;
      font-family: "jimbo-std-expanded", sans-serif;
      color: #666; /* フッターは少し色を抜いて馴染ませました */
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>{{ page.title }}</h1>
    
    <div class="poem">
      {{ content }}
    </div>

    <div class="navigation">
      {% if page.previous %}
        <a href="{{ page.previous.url | relative_url }}" class="nav-button">PREV</a>
      {% endif %}
      {% if page.next %}
        <a href="{{ page.next.url | relative_url }}" class="nav-button">NEXT</a>
      {% endif %}
    </div>
    
    <footer>
      © 2026 gem
    </footer>
  </div>
</body>
</html>
