---
layout: default
---

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>gem</title>
  
  <link rel="stylesheet" href="https://use.typekit.net/qsa5fag.css">

  <style>
    body {
      background-color: #ffffff; /* 背景を白に */
      color: #000000; /* 文字をはっきりした黒に */
      /* 英数字に Jimbo Std Expanded を適用し、日本語は読みやすいゴシック体に */
      font-family: "jimbo-std-expanded", "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 80px 20px;
    }
    
    .content {
      max-width: 700px; /* 太いフォントに合わせて少し幅を広げました */
      width: 100%;
      text-align: left;
    }

    h1 {
      /* タイトルに Jimbo を使い、ドカンと大きく */
      font-family: "jimbo-std-expanded", sans-serif;
      font-weight: 700;
      font-size: 3rem; 
      margin-top: 0;
      margin-bottom: 50px;
      line-height: 1.1;
      text-transform: uppercase; /* 英字なら大文字にするとさらに迫力が出ます */
    }

    img {
      max-width: 100%;
      height: auto;
      margin: 0 0 50px 0;
      display: block;
    }

    .poem {
      /* 本文も Jimbo で大きく見せます */
      font-size: 1.6rem;
      font-weight: 400;
      margin-top: 0;
      margin-bottom: 100px;
      white-space: pre-wrap;
    }

    .navigation {
      margin-top: 60px;
      display: flex;
      justify-content: flex-start;
      gap: 20px;
    }

    .nav-button {
      font-family: "jimbo-std-expanded", sans-serif;
      text-decoration: none;
      color: #000;
      border: 2px solid #000; /* ボタンも太めの線で Jimbo に合わせました */
      padding: 12px 24px;
      font-weight: 700;
      font-size: 1rem;
    }

    footer {
      margin-top: 100px;
      font-size: 1rem;
      font-family: "jimbo-std-expanded", sans-serif;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>{{ page.title }}</h1>
    
    <div class="poem">
      {{ content }}
    </div>

    <div class="navigation">
      {% if page.previous %}
        <a href="{{ page.previous.url | relative_url }}" class="nav-button">PREV</a>
      {% endif %}
      {% if page.next %}
        <a href="{{ page.next.url | relative_url }}" class="nav-button">NEXT</a>
      {% endif %}
    </div>
    
    <footer>
      © 2026 gem
    </footer>
  </div>
</body>
</html>
