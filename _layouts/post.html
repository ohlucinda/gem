---
layout: default
---

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>gem</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    body {
      background-color: #f0f0f0;
      color: #333;
      font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
      line-height: 1.8;
      display: flex;
      flex-direction: column;
      align-items: center; /* 骨組みは中央に置きつつ */
      margin: 0;
      padding: 80px 20px;
    }
    
    .content {
      max-width: 600px; /* この幅の中で */
      width: 100%;
      text-align: left; /* すべてを左に揃える */
    }

    h1 {
      font-size: 1.6rem;
      margin-top: 0;
      margin-bottom: 30px;
      letter-spacing: 0.12em;
      text-align: left; /* タイトルを左へ */
    }

    img {
      max-width: 80%;
      height: auto;
      margin: 0 0 30px 0; /* 写真を左に寄せて下に余白 */
      display: block;
      border-radius: 2px;
    }

    .poem {
      font-size: 1.15rem;
      color: #555;
      margin-top: 0;
      margin-bottom: 60px;
      white-space: pre-wrap;
      text-align: left; /* 本文を左へ */
      display: block;
    }

    .navigation {
      margin-top: 50px;
      display: flex;
      justify-content: flex-start; /* ボタンも左へ */
      gap: 20px;
    }

    .nav-button {
      text-decoration: none;
      color: #666;
      border: 1px solid #ccc;
      padding: 10px 20px;
      border-radius: 5px;
      font-size: 0.9rem;
    }

    footer {
      margin-top: 50px;
      font-size: 0.8rem;
      color: #999;
      text-align: left; /* コピーライトも左へ */
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>{{ page.title }}</h1>
    
    <div class="poem">
      {{ content }}
    </div>

    <div class="navigation">
      {% if page.previous %}
        <a href="{{ page.previous.url | relative_url }}" class="nav-button">← Prev</a>
      {% endif %}
      {% if page.next %}
        <a href="{{ page.next.url | relative_url }}" class="nav-button">Next →</a>
      {% endif %}
    </div>
    
    <footer>
      © 2026 gem
    </footer>
  </div>
</body>
</html>
