---
layout: null
---
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | gem</title>
  
  <link rel="icon" type="image/x-icon" href="{{ site.baseurl }}/favicon.ico">
  <link rel="apple-touch-icon" href="{{ site.baseurl }}/apple-touch-icon.png">

  <link rel="stylesheet" href="https://use.typekit.net/qsa5fag.css">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
    }
    .content {
      width: 500px;
      max-width: calc(100% - 40px);
      margin: 120px auto 100px auto; 
      display: block;
    }
    h1 {
      font-family: "jimbo-std-expanded", sans-serif;
      font-size: 2.2rem;
      margin: 0 0 80px 0;
      line-height: 1.2;
    }
    .image-wrapper {
      width: 100%;
      margin: -20px 0 100px 0;
    }
    .image-wrapper img {
      width: 100% !important;
      height: auto !important;
      display: block;
    }
    .poem {
      font-size: 1.15rem;
      line-height: 1.8;
      white-space: pre-wrap;
      color: #111;
    }
    footer {
  font-family: "jimbo-std-expanded", sans-serif;
  font-size: 14px;
  letter-spacing: 0.5px;
  margin-top: 100px;
  padding-bottom: 80px;
  opacity: 0.6;
}
    .back-link {
  display: inline-block;
  margin-top: 80px;
  margin-bottom: 60px;
  text-decoration: none;
  color: #666;
  font-family: "jimbo-std-expanded", sans-serif;
  font-size: 14px;
  letter-spacing: 0.5px;
  transition: all 0.3s ease;
}

.back-link:hover {
  color: #999;
  transform: translateY(3px);
}
  </style>
</head>
<body>
  <div class="content">
    <h1>{{ page.title }}</h1>
    <div class="image-wrapper">
      <img src="{{ site.baseurl }}/{{ page.image }}">
    </div>
    <div class="poem">
{{ content }}
    </div>

    <a href="{{ site.baseurl }}/" class="back-link">
  BACK TO HOME
</a>
    
    <footer>
      © 2026 gem
    </footer>
  </div>
</body>
</html>
