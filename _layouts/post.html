---
layout: default
---

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title }} | gem</title>
  
  <link rel="stylesheet" href="https://use.typekit.net/qsa5fag.css">

  <style>
    body {
      background-color: #ffffff;
      color: #000000;
      font-family: "jimbo-std-expanded", "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
      line-height: 1.8;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      /* 最初の 40px を 120px に変更して、全体を下に下げます */
      padding: 120px 20px; 
    }
    
    .content {
      max-width: 500px; /* 少しスリムにして縦長写真を際立たせます */
      width: 100%;
      text-align: left;
    }

    h1 {
      font-family: "jimbo-std-expanded", sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      margin-top: 0;
      margin-bottom: 80px;
    }

    /* 写真のサイズと比率を厳密に固定 */
    .image-wrapper {
      width: 100%;
      aspect-ratio: 5 / 7;
      margin-bottom: 40px;
      overflow: hidden;
      display: block;
    }

    .image-wrapper img {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
      display: block;
    }

    .poem {
      font-size: 1.1rem;
      margin-top: 0;
      margin-bottom: 60px;
      white-space: pre-wrap;
    }

    /* Jekyllが自動挿入する重複画像を隠す */
    .poem img {
      display: none !important;
    }

    .navigation {
      display: flex;
      gap: 15px;
      margin-top: 40px;
    }

    .nav-button {
      font-family: "jimbo-std-expanded", sans-serif;
      text-decoration: none;
      color: #000;
      border: 1px solid #000;
      padding: 8px 16px;
      font-size: 0.9rem;
    }

    footer {
      margin-top: 80px;
      font-size: 0.8rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>{{ page.title }}</h1>
    
    {% if page.image %}
    <div class="image-wrapper">
       <img src="{{ page.image | relative_url }}" alt="">
    </div>
    {% endif %}

    <div class="poem">
      {{ content }}
    </div>

    <div class="navigation">
      {% if page.previous %}
        <a href="{{ page.previous.url | relative_url }}" class="nav-button">PREV</a>
      {% endif %}
      {% if page.next %}
        <a href="{{ page.next.url | relative_url }}" class="nav-button">NEXT</a>
      {% endif %}
    </div>
    
    <footer>
      © 2026 gem
    </footer>
  </div>
</body>
</html>
