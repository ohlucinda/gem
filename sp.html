---
layout: null
---
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | gem</title>
  <link rel="stylesheet" href="https://use.typekit.net/qsa5fag.css">
  
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      /* スマホで文字が小さくならないようにする魔法のコード */
      -webkit-text-size-adjust: 100%;
    }
    .content {
      width: 100%;
      padding: 0 20px;
      margin: 60px auto 80px auto; 
      box-sizing: border-box;
      display: block;
    }
    h1 {
      font-family: "jimbo-std-expanded", sans-serif;
      font-size: 1.8rem; /* スマホで見栄えの良いサイズ */
      margin: 0 0 40px 0;
      line-height: 1.2;
    }
    .image-wrapper {
      width: 100%;
      margin: 0 0 60px 0;
    }
    .image-wrapper img {
      width: 100% !important;
      height: auto !important;
      display: block;
    }
    .poem {
      font-size: 1.1rem;
      line-height: 1.8;
      white-space: pre-wrap;
      color: #111;
    }
    footer {
      font-family: "jimbo-std-expanded", sans-serif;
      font-size: 1rem;
      margin-top: 80px;
      padding-bottom: 60px;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>{{ page.title }}</h1>
    <div class="image-wrapper">
      <img src="{{ site.baseurl }}/{{ page.image }}">
    </div>
    <div class="poem">
{{ content }}
    </div>
    <footer>
      © 2026 gem
    </footer>
  </div>
</body>
</html>
