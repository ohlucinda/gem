<!DOCTYPE html>
<html lang="ja">
<head>
  <script>
  if (window.innerWidth <= 700) {
    // 今いる場所（gem）にある sp.html を直接指定します
    window.location.href = window.location.pathname.replace('index.html', '') + 'sp.html';
  }
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

    body {
      margin: 0;
      padding: 0;

      -webkit-text-size-adjust: 100%;

    }
    .content {
      width: 100%;
      padding: 0 20px;
      margin: 60px auto;
      box-sizing: border-box;
      text-align: center;

      font-size: 1.3rem;
      line-height: 1.8;

      margin-bottom: 60px;
